{% extends 'base.html' %}
{% load static %}

{% block title %}Créer un Emploi du Temps - IAI-Cameroun{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-8 animate-fadeInUp">
    <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
        
        <div class="bg-gradient-to-r from-emerald-800 to-green-700 p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold flex items-center gap-2">
                    <i class="fas fa-calendar-plus"></i> Nouveau Tableau d'Emploi du Temps
                </h1>
                <p class="text-xs text-emerald-100 mt-1">Niveaux 1 et 2 - Centre de Douala</p>
            </div>
            <a href="{% url 'cours:emploi_du_temps_officiel' %}" class="bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-xl text-xs font-semibold transition">
                Annuler
            </a>
        </div>

        <form method="POST" class="p-6 md:p-8 space-y-6">
            {% csrf_token %}

            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2">
                    Intitulé de la Semaine *
                </label>
                <input type="text" name="titre_semaine" required placeholder="Ex: SEMAINE: 11 MAI - 16 MAI 2026"
                       class="w-full rounded-2xl border border-gray-300 px-4 py-3 text-sm font-bold text-gray-900 focus:ring-2 focus:ring-emerald-500">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2">
                        Filière *
                    </label>
                    <select name="filiere" required class="w-full rounded-2xl border border-gray-300 px-4 py-3 text-sm font-medium focus:ring-2 focus:ring-emerald-500">
                        <option value="">-- Sélectionnez la filière --</option>
                        {% for f in filieres %}
                        <option value="{{ f.id }}">{{ f.code }} - {{ f.nom }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2">
                        Niveau *
                    </label>
                    <select name="niveau" required class="w-full rounded-2xl border border-gray-300 px-4 py-3 text-sm font-medium focus:ring-2 focus:ring-emerald-500">
                        {% for code, label in niveaux %}
                        <option value="{{ code }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2">
                    Salle Principale d'affectation
                </label>
                <select name="salle" class="w-full rounded-2xl border border-gray-300 px-4 py-3 text-sm font-medium focus:ring-2 focus:ring-emerald-500">
                    <option value="">-- Sélectionner la salle (ex: GL3D) --</option>
                    {% for s in salles %}
                    <option value="{{ s.id }}">{{ s.code }} - {{ s.nom }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2">
                        Date de début (Lundi) *
                    </label>
                    <input type="date" name="date_debut_semaine" required
                           class="w-full rounded-2xl border border-gray-300 px-4 py-3 text-sm font-medium focus:ring-2 focus:ring-emerald-500">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2">
                        Date de fin (Samedi) *
                    </label>
                    <input type="date" name="date_fin_semaine" required
                           class="w-full rounded-2xl border border-gray-300 px-4 py-3 text-sm font-medium focus:ring-2 focus:ring-emerald-500">
                </div>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-emerald-700 to-green-600 hover:from-emerald-800 hover:to-green-700 text-white font-extrabold py-3.5 px-4 rounded-2xl shadow-lg transition duration-200 cursor-pointer">
                Créer et Passer à la Grille des Créneaux
            </button>
        </form>
    </div>
</div>
{% endblock %}
