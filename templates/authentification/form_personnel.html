{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block title %}{{ titre }} - IAI-Cameroun{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 py-8 animate-fadeInUp">
    <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
        <!-- Header -->
        <div class="bg-gradient-to-r from-green-800 to-green-700 p-6 md:p-8 text-white flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black"><i class="fas fa-user-edit mr-3 text-yellow-400"></i>{{ titre }}</h1>
                <p class="text-green-100 text-sm mt-1">Formulaire de mise à jour des informations de l'agent.</p>
            </div>
            <a href="{% url 'authentification:liste_personnel' %}" class="bg-white/10 hover:bg-white/20 px-4 py-2 rounded-xl text-sm font-semibold transition">
                <i class="fas fa-arrow-left mr-1"></i> Retour
            </a>
        </div>

        <form method="POST" class="p-6 md:p-8 space-y-6">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                {{ form|crispy }}
            </div>

            <div class="pt-4 border-t border-gray-100 flex gap-4">
                <button type="submit" class="flex-1 bg-gradient-to-r from-green-700 to-green-600 hover:from-green-800 hover:to-green-700 text-white font-black py-4 rounded-xl shadow-lg transition duration-200 text-center">
                    Enregistrer les modifications
                </button>
                <a href="{% url 'authentification:liste_personnel' %}" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold px-6 py-4 rounded-xl transition text-center">
                    Annuler
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
