{% extends 'base.html' %}
{% load static %}

{% block title %}Ajouter un événement - IAI-Cameroun{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-8 animate-fadeInUp">
    <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
        <!-- Header -->
        <div class="bg-gradient-to-r from-green-800 to-green-700 p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-lg font-bold"><i class="fas fa-calendar-plus mr-2 text-yellow-400"></i>Nouvel événement</h1>
                <p class="text-xs text-green-100 mt-1">Ajouter au calendrier académique</p>
            </div>
            <a href="{% url 'tableau_bord:calendrier' %}" class="bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-xl text-xs font-semibold transition">
                Annuler
            </a>
        </div>

        <form method="POST" class="p-6 md:p-8 space-y-4">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Titre de l'événement *</label>
                <input type="text" name="titre" required placeholder="Ex: Rattrapage Algorithmique, Conseil de discipline..."
                    class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 text-sm">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Date de début *</label>
                    <input type="date" name="date_debut" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Heure de début</label>
                    <input type="time" name="heure_debut"
                        class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 text-sm">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Description *</label>
                <textarea name="description" required rows="4" placeholder="Saisissez les détails de l'événement..."
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 text-sm"></textarea>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-green-700 to-green-600 hover:from-green-800 hover:to-green-700 text-white font-extrabold py-3 px-4 rounded-xl shadow-lg transition duration-200 mt-6">
                Ajouter l'événement
            </button>
        </form>
    </div>
</div>
{% endblock %}
