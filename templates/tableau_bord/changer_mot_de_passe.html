{% extends 'base.html' %}
{% load static %}

{% block title %}Changer de mot de passe - IAI-Cameroun{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-8 animate-fadeInUp">
    <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
        <!-- Header -->
        <div class="bg-gradient-to-r from-green-800 to-green-700 p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-lg font-bold"><i class="fas fa-key mr-2 text-yellow-400"></i>Sécurité du Compte</h1>
                <p class="text-xs text-green-100 mt-1">Changer de mot de passe</p>
            </div>
            <a href="{% url 'tableau_bord:profil' %}" class="bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-xl text-xs font-semibold transition">
                Annuler
            </a>
        </div>

        <form method="POST" class="p-6 md:p-8 space-y-4">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Mot de passe actuel *</label>
                <input type="password" name="mot_de_passe_actuel" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 text-sm">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Nouveau mot de passe *</label>
                <input type="password" name="nouveau_mot_de_passe" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 text-sm">
                <p class="text-[10px] text-gray-400 mt-1">Recommandé : Au moins 8 caractères avec chiffres et symboles.</p>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Confirmer le nouveau mot de passe *</label>
                <input type="password" name="confirmer_mot_de_passe" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 text-sm">
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-green-700 to-green-600 hover:from-green-800 hover:to-green-700 text-white font-extrabold py-3 px-4 rounded-xl shadow-lg transition duration-200 mt-6">
                Mettre à jour le mot de passe
            </button>
        </form>
    </div>
</div>
{% endblock %}
