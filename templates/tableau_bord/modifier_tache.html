{% extends 'base.html' %}
{% load static %}

{% block title %}Modifier la Tâche - IAI-Cameroun{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-8 animate-fadeInUp">
    <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
        <!-- Header -->
        <div class="bg-gradient-to-r from-green-800 to-green-700 p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-lg font-bold"><i class="fas fa-edit mr-2 text-yellow-400"></i>Modifier la tâche</h1>
                <p class="text-xs text-green-100 mt-1">Sujet : {{ cache.titre|default:tache.titre }}</p>
            </div>
            <a href="{% url 'tableau_bord:taches' %}" class="bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-xl text-xs font-semibold transition">
                Annuler
            </a>
        </div>

        <form method="POST" class="p-6 md:p-8 space-y-4">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Titre de la tâche *</label>
                <input type="text" name="titre" value="{{ cache.titre|default:tache.titre }}" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 text-sm">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Date d'échéance *</label>
                    <input type="date" name="date_echeance" value="{{ cache.date_echeance|date:'Y-m-d'|default:tache.date_echeance|date:'Y-m-d' }}" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Priorité</label>
                    <select name="priorite"
                        class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 text-sm">
                        <option value="BASSE" {% if cache.priorite == 'BASSE' or tache.priorite == 'BASSE' %}selected{% endif %}>Basse</option>
                        <option value="MOYENNE" {% if cache.priorite == 'MOYENNE' or tache.priorite == 'MOYENNE' %}selected{% endif %}>Moyenne</option>
                        <option value="HAUTE" {% if cache.priorite == 'HAUTE' or tache.priorite == 'HAUTE' %}selected{% endif %}>Haute</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Description *</label>
                <textarea name="description" required rows="4"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 text-sm">{{ cache.description|default:tache.description }}</textarea>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-green-700 to-green-600 hover:from-green-800 hover:to-green-700 text-white font-extrabold py-3 px-4 rounded-xl shadow-lg transition duration-200 mt-6">
                Enregistrer la modification
            </button>
        </form>
    </div>
</div>
{% endblock %}
