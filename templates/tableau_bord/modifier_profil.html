{% extends 'base.html' %}
{% load static %}

{% block title %}Modifier le Profil - IAI-Cameroun{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-8 animate-fadeInUp">
    <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
        <!-- Header -->
        <div class="bg-gradient-to-r from-green-800 to-green-700 p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-lg font-bold"><i class="fas fa-user-edit mr-2 text-yellow-400"></i>Modifier mes informations</h1>
                <p class="text-xs text-green-100 mt-1">Mettre à jour vos coordonnées personnelles</p>
            </div>
            <a href="{% url 'tableau_bord:profil' %}" class="bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-xl text-xs font-semibold transition">
                Annuler
            </a>
        </div>

        <form method="POST" class="p-6 md:p-8 space-y-4">
            {% csrf_token %}

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Prénom *</label>
                    <input type="text" name="first_name" value="{{ user.first_name }}" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Nom de famille *</label>
                    <input type="text" name="last_name" value="{{ user.last_name }}" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 text-sm">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Adresse E-mail *</label>
                <input type="email" name="email" value="{{ user.email }}" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 text-sm">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Téléphone</label>
                <input type="text" name="telephone" value="{{ user.telephone|default:'' }}" placeholder="+237 ..."
                    class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 text-sm">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Adresse physique</label>
                <input type="text" name="adresse" value="{{ user.adresse|default:'' }}" placeholder="Douala, Cameroun"
                    class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 text-sm">
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-green-700 to-green-600 hover:from-green-800 hover:to-green-700 text-white font-extrabold py-3 px-4 rounded-xl shadow-lg transition duration-200 mt-6">
                Enregistrer les modifications
            </button>
        </form>
    </div>
</div>
{% endblock %}
